  utter_ayuda_error_schema:
  - text: Ejemplo sintaxis de definicion del esquema (SCHEMA) **create schema EventType1(attribute type);**
  utter_error_anotacion:
  - text: Hay un error en la sintaxis al crear la ANOTACION  @Name, quieres ayuda con la sintaxis
    buttons:
