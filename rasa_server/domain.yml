  - text: Creo que no te he entendido, ¿podrías repetirlo de otra forma?
  - text: Vaya, no he entendido eso, ¿podrías repetirlo de otra manera para que pueda entenderte?
  - text: No te he entendido, por favor ¿podrías repetirlo de otra forma?
