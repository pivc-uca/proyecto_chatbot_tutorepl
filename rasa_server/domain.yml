        [Descargar archivo](http://localhost:8008/archivos/datos_planta_energia_nuclear.txt)
        
        Una vez descargado, copia y pega su contenido en el espacio **Time And Event Sequence**. Revisa si es necesario actualizar el nombre de los eventos antes de continuar.
  utter_ha_sido_de_ayuda:
  - text: ¿Ha sido de ayuda?
  utter_conceptos_basicos1:
  - text: El Lenguaje de Procesamiento de Eventos (EPL) es un lenguaje diseñado para procesar datos en tiempo real. Permite detectar patrones o ejecutar acciones automáticamente a medida que la información entra al sistema
  utter_conceptos_basicos2:
  - text: EPL es muy similar a SQL para que escribir consultas sea intuitivo. La gran diferencia es que, en lugar de consultar tablas estáticas, EPL analiza flujos de datos que no se detienen.
  utter_conceptos_basicos3:
  - text: En EPL usamos **ventanas** para agrupar eventos que llegan en distintos momentos. Mientras que SQL trabaja con datos históricos almacenados, EPL realiza consultas continuas sobre la marcha.
  utter_continuar_conceptos_basicos:
  - text: Para entender funcionamiento de EPL, tenemos casos de estudio, para ponernos en practica
  utter_sintaxis_epl:
  - text: |
      Para escribir una expresión en EPL, debes seguir esta sintaxis: ...
      
      **ANNOTATIONS** Una anotación consta del nombre de la anotación y de parámetros de anotación opcionales. *annotation_name* es el nombre de clase simple o el nombre de clase completo de la clase de anotación. ***@Name("MyStatementName")***. Para mas informacion consulta (Esper ref. 5.2.7) [click aqui](https://esper.espertech.com/release-8.9.0/reference-esper/html/epl_clauses.html#epl-syntax-annotation)
      
      **INSERT INTO** Creación de un flujo de eventos complejos (podrá formar parte de la implementación de otros patrones de evento. Para mas informacion consulta (Esper ref. 5.3.10) [click aqui](https://esper.espertech.com/release-8.9.0/reference-esper/html/epl_clauses.html#epl-selecteventbean)
      
      **SELECT** Propiedades de eventos seleccionadas. Para mas informacion consulta (Esper ref. 2.2) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/processingmodel.html#processingmodel_basicselect)
      
      **FROM** Flujos de eventos requeridos. Para mas informacion consulta (Esper ref. 5.4) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/epl_clauses.html#epl-from-clause)
      
      **FROM PATTERN** Condiciones del patrón de eventos.
      
      **WHERE** Condiciones de filtrado de eventos. Para mas informacion consulta (Esper ref. 2.9) [click aqui](https://esper.espertech.com/release-8.9.0/reference-esper/html/processingmodel.html#processingmodel_basicwhereclause)
      
      **GROUP BY** Expresiones de agrupación.
      
      **HAVING** Condiciones de agrupación.
      
      **ORDER BY** Expresiones de ordenación de eventos.
      
    image: ./imagenes/sintaxis_epl.jpg
  utter_evento:
  - text: |
      "En EPL, los eventos son como estructuras de datos que describen lo que está ocurriendo en un momento determinado. Para trabajar con ellos, necesitas saber qué tipos de datos maneja y cómo se estructuran. Por lo tanto un evento es como un objeto o registro con campos. Se definen usando **create schema**."
      
      "Los tipos de datos determinan cómo escribes las consultas, cómo comparas datos y qué tipo de lógica puedes aplicar en tiempo real."
  utter_sintaxis_schema:
  - text: |
      Utilizamos **CREATE SCHEMA** para declarar un tipo de evento
        - Después del **CREATE SCHEMA** crear esquema sigue un **schema_name**. El nombre del esquema que indica el nombre del tipo de evento.
        - Luego **property_name** es un identificador que proporciona el nombre de la propiedad del evento. 
        
      El **property_type** tipo de propiedad también es necesario para cada propiedad. 
      
      Los tipos de propiedad o datos, válidos se enumeran en:
        • **STRING** Desde un solo carácter hasta un número ilimitado de caracteres. Los delimitadores válidos son comillas simples (') o dobles (").
        • **BOOLEAN** Un valor booleano, true (verdadero) o false (falso).
        • **INTEGER** Un valor entero (4 bytes).
        • **LONG** Un valor largo (8 bytes).
        • **DOUBLE** Un punto flotante IEEE 754 de 64 bits de doble precisión.
        • **FLOAT** Un punto flotante IEEE 754 de 32 bits de precisión simple.
        • **BYTE** Un entero de complemento a dos con signo de 8 bits.
        
      Siempre necesitamos tener definido el(los) esquema(s) sobre los datos que queremos aplicar el patrón.
    image: ./imagenes/sintaxis_schema.jpg
  utter_sintaxis_select:
  - text: |
      Aquí tienes la guía rápida para el apoyo de la construccion del **SELECT**
        • **SELECT** - Propiedades de eventos seleccionadas. Para mas informacion consulta (Esper ref. 2.2) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/processingmodel.html#processingmodel_basicselect)
        • **FROM** - Flujos de eventos requeridos. Para mas informacion consulta (Esper ref. 5.4) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/epl_clauses.html#epl-from-clause)
        • **FROM PATTERN** - Condiciones del patrón de eventos. Para mas informacion consulta (Esper ref. 7.2.2) [click aqui](https://esper.espertech.com/release-8.9.0/reference-esper/html/event_patterns.html#pattern-in-eql)
        • **WHERE** - Condiciones de filtrado de eventos. Para mas informacion consulta (Esper ref. 5.5) [click aqui](https://esper.espertech.com/release-8.9.0/reference-esper/html/epl_clauses.html#epl-where-clause)
        • **GROUP BY** - Expresiones de agrupación. Para mas informacion consulta (Esper ref. 5.6.2) [click aqui](https://esper.espertech.com/release-8.9.0/reference-esper/html/epl_clauses.html#epl-grouping-group-by)
        • **HAVING** - Condiciones de agrupación.
        • **ORDER BY** - Expresiones de ordenación de eventos.
  utter_patrones: 
  - text: |
      Un patrón de eventos describe cómo se relacionan múltiples eventos en el tiempo. A diferencia de una simple consulta SELECT que opera sobre una ventana de eventos, los patrones permiten observar flujos dinámicos y relaciones temporales entre ellos.
        Se usa con la sintaxis **pattern** dentro de select from pattern [...].
        
      Para mas informacion de los operadores, consultar ( Esper ref. 7.2.2 ) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/event_patterns.html#pattern-in-eql).        
  utter_operadores_epl:
  - text: |
      Los operadores son elementos del lenguaje que te permiten construir expresiones para filtrar, comparar, agrupar y manipular datos dentro de las consultas. Son similares a los operadores en SQL, pero aplicados al contexto de eventos en tiempo real.       
        • Operadores aritméticos   + , - , * , / , %  ( Esper ref. 9.1 )
        
        • Operadores de comparación    = , != , >= , > , <= , <  ( Esper ref. 9.2 )
        
        • Operadores lógicos x    and , or , not  ( Esper ref. 9.2 )
        
        • Operadores de concatenación    ||  ( Esper ref. 9.3 )
        
        • Operadores de binarios    & , | , ^  ( Esper ref. 9.4 ) 
        
      Para mas informacion de los operadores, consultar ( Esper ref. 9 ) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/epl-operator.html).
  utter_funcion_agregacion:
  - text: |
      Las función de agregación agrupa múltiples eventos para formar un único valor, basandose en los siguientes operadores. Para mas informacion consultar Esper ref 2.3 [click link](https://esper.espertech.com/release-8.8.0/reference-esper/html_single/index.html#processingmodel_basicaggregation) y ref 10.2 [click link](https://esper.espertech.com/release-8.8.0/reference-esper/html_single/index.html#epl-function-aggregation)
        • avg
        • count
        • max
        • min
        • sum
        
      La agregación solo se permite con las cláusulas SELECT, GROUP BY y HAVING
  utter_operadores_patron:
  - text: |
      Operadores de patrón:       
        • **every** Selecciona cada evento que pertenece al tipo especificado.
        
        • **every-distinct(value)** Similar a every, pero elimina los resultados repetidos según la expresión value.
        
        • ** -> (followed-by)** Una expresión de patrón debe ser seguida por otra.
        
        • **[a:b]** Especifica el mínimo y máximo número de veces que una expresión de patrón debe ocurrir.
        
        • **[n]** Especifica el número de veces que una expresión de patrón debe ocurrir.
        
        • **until** Comprueba una expresión de patrón hasta que la condición se evalúa a verdadero.
        
        • **while** Comprueba una expresión de patrón mientras que la condición se evalúa a verdadero.
        
      Para mas informacion sobre operadores de patrón ( Esper ref 7.5 ) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/event_patterns.html#pattern-operators)
  utter_every:
  - text: |
      Cuando se utiliza el operador **EVERY** que selecciona cada evento que pertenece al tipo especificado, con el operador  **->**  (followed-by), cada vez que el operador every se reinicia también inicia una nueva instancia de subexpresión buscando eventos en la subexpresión followed-by.       
        Ejemplo de sintaxis **select e1.attribute, e2.attribute from pattern [every e1=EventType1 -> e2=EventType2]**
        
      Para mas informacion (Esper ref. 7.5.1) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/event_patterns.html#pattern-logical-every)
  utter_guarda:
  - text: |
      El filtro GUARDA (guard) **timer:within (n times)** se evalúa a falso siSe evalúa a falso si la expresión del patrón no se ha cumplido durante el periodo de tiempo indicado (years, months, weeks, days, hours, minutes, seconds, milliseconds). Es decir, el patrón saltará solo si se cumplen sus condiciones antes del tiempo indicado por el timer. Es una guarda y no permite repetición.      
        Ejemplo de sintaxis: ** select … from pattern [every ... -> … where timer:within (…)]**
        
      Para mas informacion ( Esper ref 7.5.9 ) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/event_patterns.html#pattern-guards)
  utter_ventana_datos:
  - text: |
      Las ventanas de datos se pueden definir bien por número de eventos ó por tiempo, se trata de una agregación incremental donde:
        - Las salidas de las ventanas es un subconjunto de eventos que se pueden utilizar después en otras cláusulas
        
        - Retienen los eventos a menos que haya una política de expiración o un borrado/eliminado de eventos.
        
        - Nunca duplican eventos y nunca sueltan eventos.
        
        - Mantienen el estado.
        
      Pueden ser de tipo deslizante (sliding) o de tipo batch (tumbling)
      
      Para mas información (Esper ref 14) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/epl-views.html)
  utter_ventana_por_numero:
  - text: |
      Las ventanas por número de eventos:
        • **win:length_batch(size)** Ventana batch (tumbling) que retiene el número de eventos especificado (size). El evento complejo no se lanza hasta que se ha alcanzado dicho número de eventos. Estos eventos ya no se incluyen en la siguiente ventana. Para mas informacion (Esper ref 14.3.2) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/epl-views.html#view-win-length-batch)
        
        • **win:length (size)** Ventana deslizante (sliding) según el número de eventos especificado (size). Se lanza cada vez que llega un evento, evaluando los últimos size eventos (si hay, size, y si no, los que haya). Los eventos sí se vuelven a incluir en las siguientes ventanas. Para mas informacion (Esper ref 14.3.1) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/epl-views.html#view-win-length)
  utter_ventana_por_tiempo:
  - text: |
      Las ventanas por tiempo:  
        • **win:time_batch (n seconds)** Ventana bacth (tumbling) que retiene los eventos que se den según el periodo de tiempo especificado (years, months, weeks, days, hours, minutes, seconds, milliseconds). El evento complejo no se lanza hasta que pasa el periodo de tiempo y los eventos no se repiten en las siguientes ventanas. Para mas informacion (Esper ref 14.3.5) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/epl-views.html#view-win-time-batch)
        
        • **win:time (n seconds)** Ventana deslizante (sliding) según los eventos que se den en el periodo de tiempo especificado (years, months, weeks, days, hours, minutes, seconds, milliseconds). Se lanza cada vez que llega un evento, evaluando los eventos ocurridos en los últimos n segundos (o unidad de tiempo elegida). Los eventos sí se vuelven a incluir en las siguientes ventanas. Según van llegando eventos va lanzando eventos complejos de salida. Para mas informacion (Esper ref 14.3.3) [click link](https://esper.espertech.com/release-8.9.0/reference-esper/html/epl-views.html#view-win-time)
  utter_epl_online:
  - text: |
      La pagina **Esper EPL Online** (Espertech) tiene la siguiente estructura dividida en 3 partes :
      
      • **EPL Statements** : Para rellenar con las sentencias EPL.
      
      • **Time and Event Sequences**: Para rellenar con los eventos que son datos de entrada y el avance del tiempo, para crear una simulación.
      
      • **Scenario Results**: Donde se observaran los resultados.
  utter_funcion_epl_online:
  - text: ¿Quieres explicacion como hacer funcionar La pagina Esper EPL Online?
    buttons:
    - title: SI
      payload: /explicacion_epl_online
    - title: NO
      payload: /no_continuar
  utter_explicacion_epl_online:
  - text: |
        El funcionamiento de la pagina Esper EPL Online, se resume en los siguientes pasos:
        
        1.- Colocar en el cuadro **EPL Statements** las sentencias EPL de definiciones eventos, patrones
        
        2.- Luego debes presionar el boton **SUBMIT** para validarlas • Si existen errorres se abrira una ventana **Validation Failed** con el texto **Please check the EPL Module Text** donde se encuentra el mensaje del error relacionado con la definicion de EPL o **Advance Time and Send Events text** cuando el error se relaciona con los datos de simulacion.
        
        3.- Cuando ya no se presenten errores, se debe colocar en el cuadro **Time And Event Sequence** los valores de simulacion de los eventos que debes solicitar al **ChatBot**.
       
        4.- Luego debes presionar el boton **SUBMIT** para ejecutar • Si existen errorres se abrira una ventana **Validation Failed** con el texto **Please check the Advance Time and Send Events text** donde se encuentra el mensaje del error relacionado con los datos de simulacion.
         
        5.- Los resultados seran mostrados en el cuadro **Scenario Results** 
  utter_ayuda_error_epl_online:
  - text: Para que pueda ayudarte mejor con tus ejercicios practicos en la pagina EPL OnLine, si te aparece un **ERROR**, por favor, copia el mensaje de error de la ventana emergente y pégalo directamente aquí en el **ChatBot**. Así podré analizarlo y guiarte
  utter_error_schema_1:
