      payload: /explicar_sintaxis_select_caso2_oaa     
  utter_continuar_select_patron_caso2_oaa:
  - text: "Ver explicacion patron **pattern**"
    buttons:
    - title: Continuar
      payload: /explicar_sintaxis_select_patron_caso2_oaa        
  utter_error_datos:
  - text: Hay un error o problema en la ventana **Advance Time and Send Events** donde se van colocados los datos de los eventos en el tiempo simulado. Por favor, revisa el formato de tus eventos y los intervalos de tiempo
  utter_ayuda_error_datos:
  - text: |
      Puedes solicitarme el archivo con los datos de simulacion para tu caso de estudio
      La estructura debe ser un evento del tipo definido en **SCHEMA** con su respectiva estructura, avanzando en el tiempo los eventos con timestamp, como por ejemplo
          **StockTick={{symbol='GE', price=20.5}}** --> Evento
          **t=t.plus(5 seconds)** --> Avance de tiempo
          **StockTick={{symbol='YHOO', price=65}}** --> Evento
