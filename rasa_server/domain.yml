  utter_error_insert:
  - text: Hay un error en la sintaxis INSERT, quieres ayuda con la sintaxis
    buttons:
    - title: SI
      payload: /ayuda_error_insert
    - title: NO
      payload: /no_continuar
  utter_ayuda_error_insert:
  - text: |
      Cuando queremos que la salida de un patrón sea a la vez un nuevo evento entrante al flujo de eventos de modo que lo podamos detectar en otro patrón. 
      Ejemplo sintaxis de definicion de INSERT
      @Name(“…")
      **insert into NombreNuevoEvento**
      select …
      from …
  utter_error_select_monitor:
  - text: Hay un error en la sintaxis del SELECT para el patron MONITOR, quieres ayuda con la sintaxis
    buttons:
    - title: SI
      payload: /ayuda_error_select_monitor
    - title: NO
      payload: /no_continuar
  utter_ayuda_error_select_monitor:
  - text: |
      El patrón **MONITOR** a construir consiste en utilizar una ventana temporal de tiempo para calcular un valor promedio, para lo cual usaremos **Operadores de agregación** y **Ventana de datos por tiempo**
      
        • Lo primero, (FROM) se define una ventana por lotes de tiempo (time batch window) **WIN:TIME_BATCH** de XX segundos. Esto significa que cada XX segundos, se agruparán todos los eventos TemperatureEvent que hayan llegado en ese periodo, y se procesarán como un lote.
        
        • Lo segundo, (SELECT) para cada lote de XX segundos, se calculará el promedio del campo **AVG** de todos los eventos a1 (es decir, todos los TemperatureEvent que llegaron en esa ventana). El resultado se emitirá una vez por cada lote, es decir, cada XX segundos.
  utter_continuar_select_monitor:
  - text: "Ver explicacion sintaxis SELECT"
    buttons:
    - title: Continuar
      payload: /explicar_sintaxis_select_monitor
  utter_continuar_select_monitor_funcion_agregacion:
  - text: "Ver explicacion función de agregación"
    buttons:
    - title: Continuar
      payload: /explicar_funcion_agregacion
  utter_continuar_select_monitor_ventana:
  - text: "Ver explicacion ventana de datos"
    buttons:
    - title: Continuar
      payload: /explicar_ventanas
  utter_continuar_select_monitor_ventana_tiempo:
  - text: "Ver explicacion ventana de datos por tiempo"
    buttons:
    - title: Continuar
      payload: /explicar_ventanas_tiempo       
  utter_error_select_warning:
  - text: Hay un error en la sintaxis del SELECT para el patron WARNING, quieres ayuda con la sintaxis
    buttons:
    - title: SI
      payload: /ayuda_error_select_warning
    - title: NO
      payload: /no_continuar
  utter_ayuda_error_select_warning:
  - text: |
      La intención del patron **WARNING** es detectar patrones secuenciales de eventos que cumplan cierta condición.
      
      Lo primero, se está buscando un patrón secuencial donde (PATTERN), usando la palabra clave **EVERY** indica que este patrón se busca repetidamente en el flujo de eventos. Es decir, no se detiene tras encontrar una coincidencia, sigue buscando desde el siguiente evento.
        • Primero ocurra un evento a1 de tipo TemperatureEvent con valor > XXX, y luego
        • Ocurra otro evento a2 también de tipo TemperatureEvent con value > YYY.
        
      Lo segundo, una vez que el patrón es detectado, se seleccionan (SELECT)
        • El timestamp del segundo evento (a2)
        • El valor del primer evento (a1.value)
        • El valor del segundo evento (a2.value)
  utter_continuar_select_warning:
  - text: "Ver explicacion sintaxis SELECT"
    buttons:
    - title: Continuar
      payload: /explicar_sintaxis_select_warning        
  utter_continuar_select_patron:
  - text: "Ver explicacion patron **pattern**"
    buttons:
    - title: Continuar
      payload: /explicar_patron
  utter_error_select_critical:
  - text: Hay un error en la sintaxis del SELECT para el patron CRITICAL, quieres ayuda con la sintaxis
    buttons:
    - title: SI
      payload: /ayuda_error_select_critical
    - title: NO
      payload: /no_continuar
  utter_ayuda_error_select_critical:
  - text: |
      El patrón **CRITICAL** es un ejemplo avanzado de detección de una secuencia ascendente de eventos de temperatura con una condición final adicional.
      
      La consulta (PATTERN) está buscando detectar una secuencia de 4 eventos consecutivos (a1 → a2 → a3 → a4) donde cada evento representa una temperatura creciente, y el último (a4) debe superar un umbral adicional.
        • Se detecta un primer evento (a1) con valor mayor a XX.
        • El siguiente evento (a2) debe tener un valor mayor que el de a1.
        • El tercer evento (a3) debe tener un valor mayor que el de a2.
        • El cuarto evento (a4) debe tener un valor mayor que el de a3 y adicionalmente ser al menos un 50% mayor que el valor de a1.
        
      El (SELECT) si la cadena de eventos ocurre, se emite el evento a4 su contenido (valor, timestamp, etc.).
  utter_continuar_select_critical:
  - text: "Ver explicacion sintaxis SELECT"
    buttons:
    - title: Continuar
      payload: /explicar_sintaxis_select_critical 
  utter_error_select_explosion_rueda:
  - text: Hay un error en la sintaxis del SELECT para el patron EXPLOSION RUEDA, quieres ayuda con la sintaxis
    buttons:
    - title: SI
      payload: /ayuda_error_select_explosion_rueda
    - title: NO
      payload: /no_continuar      
  utter_ayuda_error_select_explosion_rueda:
  - text: |
      El patrón simple **Explosion Rueda** a construir consiste en supervisar la seguridad de las ruedas comparando dos eventos sucesivos de un mismo vehículo.
        Usaremos el operador de patron **EVERY** y entender la lógica del "Estado A -> Estado B" **(followed-by)**
      Aquí te explico cómo funciona paso a paso:
        - Identificación del Vehículo: El sistema se mantiene atento a cada evento de un coche. Cuando recibe uno, guarda los datos de presión iniciales como referencia.
        - La Condición Crítica: El patrón se activa si, tras ese primer evento, llega un segundo reporte del mismo coche donde la presión de cualquiera de las cuatro ruedas cae drásticamente (a menos de la mitad de lo que marcaba originalmente).
        - El Factor Tiempo (La Guarda): Para que se considere una "explosión" y no una pérdida de aire gradual, este cambio brusco debe ocurrir en un intervalo de máximo 2 segundos.
  utter_error_select_colision:
  - text: Hay un error en la sintaxis del SELECT para el patron COLISION, quieres ayuda con la sintaxis
    buttons:
    - title: SI
      payload: /ayuda_error_select_colision
    - title: NO
      payload: /no_continuar      
  utter_ayuda_error_select_colision:
  - text: |
      El patrón simple **Colision** a construir consiste en identificar una parada de emergencia o impacto basándose en una pérdida de velocidad radical y repentina.
      Usaremos el operador de patron **EVERY** y entender la lógica del "Estado A -> Estado B" **(followed-by)**
      Se divide en tres fases lógicas:
        - Condición de Inicio (Estado A): El sistema se "activa" únicamente cuando detecta un coche circulando a una velocidad considerable (superior a 50 km/h). Si el coche va más lento, el sistema ignora el evento para evitar falsas alarmas.
        - El Cambio Drástico (Estado B): Tras detectar el coche a alta velocidad, el patrón busca un segundo evento del mismo vehículo (a.carId = b.carId) donde la velocidad haya caído a 0 km/h (o menos, por margen de seguridad).
        - La Ventana Crítica (Timer): Para que se registre como una colisión y no como un frenado normal en un semáforo, esta transición de ">50" a "0" debe ocurrir en un intervalo máximo de 3 segundos.
  utter_error_select_ocupante_abandona_asiento:
  - text: Hay un error en la sintaxis del SELECT para el patron OCUPANTE ABANDONA ASIENTO, quieres ayuda con la sintaxis
    buttons:
    - title: SI
      payload: /ayuda_error_select_ocupante_abandona_asiento
    - title: NO
      payload: /no_continuar      
  utter_ayuda_error_select_ocupante_abandona_asiento:
  - text: |
      El patrón simple **Ocupante Abandona Asiento** a construir consiste en detectar el momento exacto en que una persona se levanta de un asiento que previamente estaba ocupado. La lógica se basa en comparar el "antes" y el "después" de los sensores presencia del asiento (son 4 sensores).
        - Usaremos el operador de patron **EVERY** y entender la lógica del "Estado A -> Estado B" **(followed-by)**
        - Detección de Asiento Ocupado (Estado A): El sistema se activa cuando detecta que al menos uno de los cuatro asientos del coche está ocupado (true). En este punto, el patrón "etiqueta" ese estado inicial para compararlo más tarde.
        - El Cambio a "Libre" (Estado B): El patrón espera a que llegue un nuevo evento del mismo vehículo donde ocurra una transición específica: un asiento que estaba en true (ocupado) pase a estar en false (libre).
  utter_error_select_accidente_ocupante_despedido:
  - text: Hay un error en la sintaxis del SELECT para el patron ACCIDENTE OCUPANTE DESPEDIDO, quieres ayuda con la sintaxis
    buttons:
    - title: SI
      payload: /ayuda_error_select_accidente_ocupante_despedido
    - title: NO
      payload: /no_continuar      
  utter_ayuda_error_select_accidente_ocupante_despedido:
  - text: |
      El patrón complejo **Accidente Ocupante Despedido** a construir consiste en una cadena de eventos correlacionados, no busca un solo suceso, sino una reacción en cadena de tres situaciones que ocurren para confirmar un accidente grave donde: El Detonante **(Explosión de Rueda)**, la Consecuencia Inmediata **(Colisión)** y el Resultado Crítico **(Ocupante Abandona Asiento)**.
        - Usaremos el operador de patron **EVERY** y entender la lógica de las secuencias "Patrón E → Patrón C → Patrón O" **(followed-by)**.
        - La Ventana de Tiempo **(La Guarda)**: Para que el sistema considere que estos tres eventos están relacionados como un solo accidente, toda la secuencia (Explosión → Choque → Salida) debe ocurrir en un máximo de 5 segundos.      
  utter_continuar_select_caso2:
  - text: "Ver explicacion sintaxis SELECT y operadores"
    buttons:
    - title: Continuar
      payload: /explicar_sintaxis_select_caso2  
  utter_continuar_select_patron_caso2:
