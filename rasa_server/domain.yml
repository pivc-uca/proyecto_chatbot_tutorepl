  utter_planta_nuclear:
  - image: ./imagenes/planta_nuclear.jpg
    text: |
      La central eléctrica tiene un NUCLEO, si se calienta demasiado, suceden cosas muy malas, tenemos medidores de temperatura ¿termómetros? que toman una lectura de la temperatura cada segundo y envían los datos a un sistema de monitoreo central.
      Necesitamos recibir notificaciones cuando se detecten 3 tipos de eventos complejos:
      - **Monitor**: la temperatura promedio cada X segundos, para fines informativos
      - **Warning**: AVISARNOS si tenemos 2 temperaturas consecutivas por encima de un determinado umbral.
      - **Critical**: ALERTARNOS si tenemos 4 eventos consecutivos, con el primero por encima de un cierto umbral, y cada uno posterior mayor que el último, y el último siendo 1,5 veces mayor que el primero. Esto intenta alertarnos de que tenemos un aumento repentino y creciente de la temperatura, que esto es algo muy malo.
  utter_trafico_carretera:
  - text: |
      Sensores en un coche que miden:
      - Presión de las ruedas.
      - Velocidad del coche.
      - Asiento ocupado o libre.
      Tendremos los siguientes patrones:
      - **PerdidaPresionRueda** : la presión de una rueda pasa a un valor donde disminuye en un tiempo 10 segundos.
      - **ExplosionRueda** : la presión de una rueda pasa a un valor donde disminuye (50%) en un corto tiempo 5 segundos.
      - **Colision** : la velocidad del coche superior a 50 km/h pasa a 0 km/h en  en un corto tiempo 3 segundos.
      - **OcupanteAbandonaAsiento** : el asiento ocupado pasa a estar libre. 
      - **AccidenteOcupanteDespedido** : se explota una rueda y,en los siguientes 3 segundos, se produce una colisión provocando que el ocupante abandone el asiento.
    image: ./imagenes/trafico_carretera.jpg
  utter_continuar_caso_estudio:
  - text: Espero hayas entendido el caso de estudio **{caso_estudio}**.
  utter_sin_caso_estudio:
  - text: Has seleccionado la opcion Libre guiado por la IA, describe tu caso para que IA pueda crear los datos de tu caso
  utter_ayuda_implementacion_planta_energia_nuclear:
  - text: |
      Para implementar el caso planta energia nuclear, los pasos a seguir son definir las siguientes sentecias:
      1) definir esquema ** SCHEMA **, debemos definir qué datos tiene el evento TemperatureEvent, es decir Tiempo y Valor temperatura
      2) definir anotacion ** ANNOTATIONS **, debemos definir el nombre por cada patron solicitado: Monitor, Warning, Critical
      3) definir insercion del patron ** INSERT INTO **
      4) definir seleccion de las propiedades del evento ** SELECT **
      Del paso 2 a 4 se repetira por cada uno de los 3 patrones que tiene el caso
  utter_ayuda_implementacion_trafico_carretera:
  - text: |
      Para implementar el caso trafico de carreteras, los pasos a seguir son definir las siguientes sentecias:
      1) definir esquema ** SCHEMA ** , debemos definir qué datos tiene el evento CarEvent, es decir por cada sensor: Identificador carro, Tiempo, Presión de las ruedas (4), Velocidad del coche y Asiento ocupado o libre (4).
      2) definir anotacion ** ANNOTATIONS **, debemos definir el nombre por cada patron solicitado: PerdidaPresion Rueda, Explosion Rueda, Colision, Ocupante Abandona Asiento y Accidente Ocupante Despedido	
      3) definir insercion del patron ** INSERT INTO **
      4) definir seleccion de las propiedades del evento ** SELECT **
      Del paso 2 a 4 se repetira por cada uno de los 4 patrones que tiene el caso  
